<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Vé Tháng - Parking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-200 h-screen w-full flex flex-col overflow-hidden">

    <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 text-blue-500 font-bold text-lg tracking-tight">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                Parking Dashboard
            </div>
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-400">
                <a href="index.html" class="hover:text-white transition border-b-2 border-transparent py-4">Hệ thống</a>
                <a href="data.html" class="hover:text-white transition border-b-2 border-transparent py-4">Dữ liệu</a>
                <a href="register.html" class="text-white transition border-b-2 border-blue-500 py-4">Đăng ký thẻ</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 overflow-y-auto">
        <div class="bg-slate-900 border border-slate-800 rounded-xl shadow-2xl p-8 w-full max-w-lg">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white mb-2">Đăng Ký Khách Hàng (Vé Tháng)</h1>
                <p class="text-slate-400 text-sm">Cấp phát thẻ RFID mới cho cư dân / nhân viên</p>
            </div>

            <form id="registerForm" class="flex flex-col gap-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Mã Thẻ RFID (Bắt buộc)</label>
                    <input type="text" id="regRfid" required placeholder="VD: A7AD0A96" class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 transition font-mono uppercase">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Biển số xe (Bắt buộc)</label>
                    <input type="text" id="regPlate" required placeholder="VD: 59F109865" class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 transition font-mono uppercase">
                    <p class="text-xs text-slate-500 mt-1">* Viết liền, không dấu gạch ngang</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Tên chủ xe</label>
                    <input type="text" id="regName" placeholder="VD: Nguyễn Văn A" class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Số điện thoại</label>
                    <input type="text" id="regPhone" placeholder="VD: 0987654321" class="w-full bg-slate-950 border border-slate-700 text-slate-200 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 transition">
                </div>

                <div id="regMessage" class="hidden text-center text-sm font-bold py-2 rounded-lg mt-2"></div>

                <button type="submit" id="submitBtn" class="mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition shadow-[0_0_15px_rgba(37,99,235,0.3)]">
                    + THÊM VÀO CƠ SỞ DỮ LIỆU
                </button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Ngăn trình duyệt load lại trang
            
            const btn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('regMessage');
            
            // Lấy dữ liệu
            const data = {
                rfid_code: document.getElementById('regRfid').value.trim().toUpperCase(),
                owner_name: document.getElementById('regName').value.trim(),
                plate_number: document.getElementById('regPlate').value.trim().toUpperCase(),
                phone: document.getElementById('regPhone').value.trim()
            };

            btn.innerText = "Đang xử lý...";
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                msgBox.classList.remove('hidden');
                if (result.status === "success") {
                    msgBox.className = "text-center text-sm font-bold py-3 rounded-lg mt-2 bg-emerald-600/20 text-emerald-400 border border-emerald-500";
                    msgBox.innerText = "✅ " + result.message;
                    document.getElementById('registerForm').reset(); // Xóa form
                } else {
                    msgBox.className = "text-center text-sm font-bold py-3 rounded-lg mt-2 bg-red-600/20 text-red-400 border border-red-500";
                    msgBox.innerText = "❌ " + result.message;
                }
            } catch (error) {
                msgBox.classList.remove('hidden');
                msgBox.className = "text-center text-sm font-bold py-3 rounded-lg mt-2 bg-red-600/20 text-red-400 border border-red-500";
                msgBox.innerText = "❌ Lỗi kết nối đến máy chủ!";
            } finally {
                btn.innerText = "+ THÊM VÀO CƠ SỞ DỮ LIỆU";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
