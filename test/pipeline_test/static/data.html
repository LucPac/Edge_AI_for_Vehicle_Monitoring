<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dữ liệu - Parking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-200 h-screen w-full flex flex-col overflow-hidden">

    <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 text-blue-500 font-bold text-lg tracking-tight">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                Parking Dashboard
            </div>
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-400">
                <a href="index.html" class="hover:text-white transition border-b-2 border-transparent py-4">Hệ thống</a>
                <a href="data.html" class="text-white transition border-b-2 border-blue-500 py-4">Dữ liệu</a>
                <a href="register.html" class="hover:text-white transition border-b-2 border-transparent py-4">Đăng ký thẻ</a>
            </nav>
        </div>
        <div class="flex items-center gap-2 bg-slate-800 py-1.5 px-3 rounded-full cursor-pointer hover:bg-slate-700 transition">
            <div class="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center text-xs font-bold text-white">AD</div>
            <span class="font-medium text-sm">Admin</span>
        </div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-100">Lịch sử ra vào bãi xe</h1>
            
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Tìm theo biển số..." class="bg-slate-900 border border-slate-700 text-slate-200 text-sm rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                    Tìm kiếm
                </button>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-lg overflow-hidden shadow-lg">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-950/50 text-slate-400 text-sm uppercase tracking-wider border-b border-slate-800">
                        <th class="px-6 py-4 font-medium">Mã Thẻ (RFID)</th>
                        <th class="px-6 py-4 font-medium">Biển số</th>
                        <th class="px-6 py-4 font-medium">Loại Khách</th>
                        <th class="px-6 py-4 font-medium">Giờ Vào</th>
                        <th class="px-6 py-4 font-medium">Giờ Ra</th>
                        <th class="px-6 py-4 font-medium">Trạng thái</th>
                        <th class="px-6 py-4 font-medium text-right">Phí gửi</th>
                    </tr>
                </thead>
                <tbody id="logTableBody" class="text-sm divide-y divide-slate-800/50">
                    <tr>
                        <td colspan="7" class="text-center py-8 text-slate-500">
                            <div class="flex flex-col items-center justify-center gap-2">
                                <svg class="w-6 h-6 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                Đang tải dữ liệu từ máy chủ...
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // HÀM LẤY DỮ LIỆU TỪ SERVER
        async function fetchLogs() {
            try {
                const response = await fetch('http://localhost:8000/api/logs');
                const data = await response.json();
                
                const tbody = document.getElementById('logTableBody');
                tbody.innerHTML = ''; 

                data.forEach(log => {
                    let statusHtml = '';
                    let priceClass = '';
                    let typeHtml = '';
                
                    if (log.customer_type.includes('Khách Đăng Ký')) {
                        typeHtml = `<span class="bg-emerald-600/20 text-emerald-400 px-2 py-1 rounded text-xs border border-emerald-600/30 inline-block text-center leading-tight">${log.customer_type}</span>`;
                    } else {
                        typeHtml = `<span class="bg-blue-600/20 text-blue-400 px-2 py-1 rounded text-xs border border-blue-600/30 inline-block">${log.customer_type}</span>`;
                    }

                    // 2. Phân loại trạng thái và màu sắc
                    if (log.status === 'COMPLETED') {
                        statusHtml = '<span class="bg-emerald-500/20 text-emerald-400 px-2.5 py-1 rounded-full text-xs border border-emerald-500/20">Hoàn thành</span>';
                        priceClass = log.customer_type === 'Khách Đăng Ký' ? 'text-emerald-400 font-bold' : 'text-yellow-400 font-bold text-base';
                    
                    } else if (log.status === 'PARKING') {
                        statusHtml = '<span class="bg-blue-500/20 text-blue-400 px-2.5 py-1 rounded-full text-xs border border-blue-500/20">Đang gửi</span>';
                        priceClass = 'text-slate-500';
                    
                    } else if (log.status === 'ERROR_IN') {
                        statusHtml = '<span class="bg-red-500/20 text-red-400 px-2.5 py-1 rounded-full text-xs border border-red-500/20">Cảnh báo (Vào)</span>';
                        priceClass = 'text-slate-500';
                    
                    } else if (log.status === 'ERROR_OUT') {
                        statusHtml = '<span class="bg-red-500/20 text-red-400 px-2.5 py-1 rounded-full text-xs border border-red-500/20">Cảnh báo (Ra)</span>';
                        priceClass = log.customer_type === 'Khách Đăng Ký' ? 'text-emerald-400 font-bold' : 'text-yellow-400 font-bold text-base';
                    }
                    const row = `
                        <tr class="hover:bg-slate-800/50 transition">
                            <td class="px-6 py-4 font-mono text-slate-400">${log.ticket}</td>
                            <td class="px-6 py-4 font-bold text-slate-200">${log.plate}</td>
                            <td class="px-6 py-4">${typeHtml}</td>
                            <td class="px-6 py-4 text-slate-400">${log.time_in}</td>
                            <td class="px-6 py-4 text-slate-400">${log.time_out}</td>
                            <td class="px-6 py-4">${statusHtml}</td>
                            <td class="px-6 py-4 text-right ${priceClass}">${log.fee}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-6 text-slate-500">Chưa có lịch sử xe ra vào bãi.</td></tr>';
                }

            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
                document.getElementById('logTableBody').innerHTML = `<tr><td colspan="7" class="text-center py-6 text-red-400">Không thể kết nối đến máy chủ! Vui lòng kiểm tra lại Backend.</td></tr>`;
            }
        }

        // CHẠY HÀM LẤY DỮ LIỆU KHI MỞ TRANG
        document.addEventListener('DOMContentLoaded', fetchLogs);

        // ========================================================
        // ĐOẠN CODE TÌM KIẾM VÀ HIGHLIGHT ĐƯỢC ĐẶT Ở ĐÂY NÈ
        // ========================================================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toUpperCase().trim();
            const rows = document.querySelectorAll('#logTableBody tr');

            rows.forEach(row => {
                // Ô chứa biển số là ô td thứ 2
                const plateCell = row.querySelector('td:nth-child(2)');
                if (plateCell) {
                    const plateText = plateCell.textContent;
                    if (searchTerm === "") {
                        // Nếu xóa trống thì hiện lại tất cả, bỏ highlight
                        row.style.display = '';
                        row.classList.remove('bg-blue-900/40');
                    } else if (plateText.includes(searchTerm)) {
                        // Nếu tìm thấy: Giữ lại và đổi màu nền (Highlight)
                        row.style.display = '';
                        row.classList.add('bg-blue-900/40');
                    } else {
                        // Nếu không thấy: Ẩn dòng đi
                        row.style.display = 'none';
                        row.classList.remove('bg-blue-900/40');
                    }
                }
            });
        });
    </script>
</body>
</html>
